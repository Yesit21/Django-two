services:
  - type: web
    name: taller-django-ucc
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn taller_formularios_nombre_estudiantes.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: taller-django-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False

databases:
  - name: taller-django-db
    databaseName: taller_django_db
    user: taller_user
